<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0F1411" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..600&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
  <title>Steady</title>
  <style>
    /* ── Steady tokens · mood-dynamic ─────────────────────────── */
    :root {
      --radius-card: 4px;
      --radius-button: 4px;
      --radius-chip: 999px;
      --tap: 48px;
      --font-display: "Fraunces", "Source Serif 4", Georgia, serif;
      --font-body: "Inter Tight", "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;

      /* Default — Grove light */
      --bg: #F4F0E6;
      --bg-elev: #FFFFFF;
      --bg-soft: #E6E0CF;
      --ink: #1F2820;
      --ink-dim: #5A6B5C;
      --ink-faint: #A4B0A6;
      --hairline: rgba(31,40,32,0.08);
      --accent: #4A6B52;
      --accent-ink: #FBF8EE;
      --accent-soft: #D4DDC8;
      --glow: rgba(74,107,82,0.18);
    }
    [data-weather="dawn"] {
      --bg: #FBF1E8; --bg-elev: #FFFFFF; --bg-soft: #F4E2D2;
      --ink: #2A1F19; --ink-dim: #6E5A4D; --ink-faint: #B49E8E;
      --hairline: rgba(42,31,25,0.08);
      --accent: #E07856; --accent-ink: #FFFFFF; --accent-soft: #F8D8C8;
      --glow: rgba(224,120,86,0.18);
    }
    [data-weather="dusk"] {
      --bg: #F2EEF7; --bg-elev: #FFFFFF; --bg-soft: #E2DBEE;
      --ink: #1F1A2E; --ink-dim: #605779; --ink-faint: #A89FBC;
      --hairline: rgba(31,26,46,0.08);
      --accent: #5B4FA5; --accent-ink: #F6F2FF; --accent-soft: #D8D1F0;
      --glow: rgba(91,79,165,0.18);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0F1411; --bg-elev: #181E1A; --bg-soft: #222A24;
        --ink: #E8EDE4; --ink-dim: #90A293; --ink-faint: #4A5A4F;
        --hairline: rgba(232,237,228,0.08);
        --accent: #88B496; --accent-ink: #0F1411; --accent-soft: #1F2C24;
        --glow: rgba(136,180,150,0.28);
      }
      [data-weather="dawn"] {
        --bg: #1A1310; --bg-elev: #241B16; --bg-soft: #2E231C;
        --ink: #F2E4D7; --ink-dim: #A89685; --ink-faint: #5C4D43;
        --hairline: rgba(242,228,215,0.08);
        --accent: #F08F6A; --accent-ink: #1A1310; --accent-soft: #3A2418;
        --glow: rgba(240,143,106,0.30);
      }
      [data-weather="dusk"] {
        --bg: #11101A; --bg-elev: #1A1925; --bg-soft: #252336;
        --ink: #ECE6F5; --ink-dim: #9A92AE; --ink-faint: #4F4860;
        --hairline: rgba(236,230,245,0.08);
        --accent: #A99CE8; --accent-ink: #11101A; --accent-soft: #262238;
        --glow: rgba(169,156,232,0.32);
      }
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
    }
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.5;
      overscroll-behavior-y: none;
      -webkit-font-smoothing: antialiased;
      transition: color 0.28s ease;
    }

    .bg-video, .bg-image, .bg-overlay {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .bg-video, .bg-image {
      object-fit: cover;
      z-index: -2;
      background: var(--bg);
      display: none;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    .bg-video.active, .bg-image.active {
      display: block;
      opacity: 1;
    }
    .bg-overlay {
      z-index: -1;
      background: rgba(15, 20, 17, 0.55);
      transition: background 0.28s ease;
    }
    @media (prefers-color-scheme: light) {
      .bg-overlay { background: rgba(244, 240, 230, 0.55); }
    }
    @media (prefers-reduced-motion: reduce) {
      .bg-video, .bg-image { display: none; }
      .bg-overlay { display: none; }
      html, body { background: var(--bg); }
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
      padding: env(safe-area-inset-top) 22px calc(env(safe-area-inset-bottom) + 96px);
    }

    /* svg icon defs are display:none; only their <use> references render */
    #icon-defs { position: absolute; width: 0; height: 0; overflow: hidden; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 0 22px;
    }
    .wordmark {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 500;
      font-style: italic;
      letter-spacing: -0.01em;
      font-variation-settings: "opsz" 144;
      color: var(--ink);
      margin: 0;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .weather-badge {
      font-family: var(--font-body);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-dim);
      padding: 3px 9px;
      border: 0.5px solid var(--hairline);
      border-radius: 999px;
      transition: color 0.28s ease, border-color 0.28s ease;
    }
    .header-right { display: flex; align-items: center; gap: 10px; color: var(--ink-dim); }
    .streak-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
    }
    .streak-pill svg { color: var(--accent); }
    .icon-btn {
      background: transparent;
      border: none;
      color: var(--ink-dim);
      width: var(--tap);
      height: var(--tap);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      cursor: pointer;
      padding: 0;
      transition: background 0.15s, color 0.15s;
    }
    .icon-btn:active { background: var(--bg-soft); color: var(--ink); }

    main { flex: 1; }

    .section { margin-bottom: 24px; }
    .section-label {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 600;
      color: var(--ink-dim);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 12px;
    }

    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      min-height: 44px;
      padding: 0 16px;
      border-radius: var(--radius-chip);
      background: var(--bg-elev);
      border: 0.5px solid var(--hairline);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: -0.005em;
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s, color 0.18s;
      display: inline-flex;
      align-items: center;
    }
    .chip:active { background: var(--bg-soft); }
    .chip.selected {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--accent-ink);
    }

    .energy-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .energy-toggle .chip {
      justify-content: center;
      padding: 0 8px;
      border-radius: var(--radius-button);
    }

    .free-text-toggle {
      background: transparent;
      border: none;
      color: var(--ink-dim);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      padding: 8px 0;
      cursor: pointer;
      text-decoration: underline;
      text-decoration-color: var(--ink-faint);
      text-underline-offset: 4px;
    }
    .free-text-input {
      width: 100%;
      background: var(--bg-elev);
      border: 0.5px solid var(--hairline);
      border-radius: var(--radius-card);
      color: var(--ink);
      padding: 12px 14px;
      font-size: 16px;
      font-family: var(--font-body);
      resize: none;
      margin-top: 10px;
      min-height: 80px;
    }
    .free-text-input:focus { outline: none; border-color: var(--accent); }

    .sticky-cta {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 28px 22px calc(env(safe-area-inset-bottom) + 14px);
      background: transparent;
      max-width: 480px;
      margin: 0 auto;
      z-index: 10;
      pointer-events: none;
    }
    .sticky-cta > * { pointer-events: auto; }
    .cta {
      width: 100%;
      min-height: 56px;
      border-radius: var(--radius-button);
      background: var(--accent);
      color: var(--accent-ink);
      border: none;
      font-family: var(--font-body);
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.005em;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.18), 0 16px 36px rgba(0,0,0,0.28), 0 0 0 1px rgba(255,255,255,0.06) inset;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      transition: background 0.15s, transform 0.05s, box-shadow 0.28s ease;
    }
    .cta:active { transform: scale(0.99); }
    .cta:disabled { background: var(--bg-soft); color: var(--ink-faint); box-shadow: none; cursor: not-allowed; }

    /* Content card */
    .content-view {
      display: none;
      flex-direction: column;
      animation: slideUp 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .content-view.active { display: flex; }
    @media (prefers-reduced-motion: reduce) {
      .content-view { animation: none; }
      html, body { transition: none; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .content-type-tag {
      display: inline-block;
      align-self: flex-start;
      font-family: var(--font-body);
      font-size: 10px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      margin-bottom: 22px;
      padding: 4px 10px;
      background: var(--accent-soft);
      border-radius: 999px;
    }
    .content-text {
      font-family: var(--font-display);
      font-size: 28px;
      line-height: 1.25;
      font-weight: 360;
      letter-spacing: -0.018em;
      color: var(--ink);
      text-wrap: pretty;
      font-variation-settings: "opsz" 144;
      margin: 0 0 14px;
      padding: 24px 22px 22px;
      background: rgba(255, 255, 255, 0.62);
      border: 0.5px solid rgba(255, 255, 255, 0.5);
      border-radius: var(--radius-card);
      backdrop-filter: blur(16px) saturate(120%);
      -webkit-backdrop-filter: blur(16px) saturate(120%);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.22);
    }
    @media (prefers-color-scheme: dark) {
      .content-text {
        background: rgba(15, 20, 17, 0.55);
        border-color: rgba(255, 255, 255, 0.08);
      }
    }
    .content-attribution {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--ink-dim);
      margin: 0 4px 32px;
    }

    .feedback-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .feedback-btn {
      min-height: 56px;
      border-radius: var(--radius-button);
      background: var(--bg-elev);
      border: 0.5px solid var(--hairline);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .feedback-btn svg { color: var(--ink-dim); transition: color 0.15s; }
    .feedback-btn:active { background: var(--bg-soft); }
    .feedback-btn.recorded {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
    }
    .feedback-btn.recorded svg { color: var(--accent); }

    .secondary-actions {
      display: flex;
      gap: 8px;
      flex-direction: column;
    }
    .secondary-btn {
      min-height: 44px;
      border-radius: var(--radius-button);
      background: transparent;
      border: 0.5px solid var(--hairline);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .secondary-btn:active { background: var(--bg-soft); }
    .secondary-btn.ghost { border: none; color: var(--ink-dim); }

    /* History view */
    .history-view {
      display: none;
      flex-direction: column;
    }
    .history-view.active { display: flex; }
    .history-item {
      padding: 14px;
      background: var(--bg-elev);
      border-radius: var(--radius-card);
      margin-bottom: 10px;
      border: 0.5px solid var(--hairline);
    }
    .history-item .when {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-dim);
      margin-bottom: 6px;
    }
    .history-item .state {
      font-size: 14px;
      color: var(--ink);
      margin-bottom: 4px;
      line-height: 1.4;
    }
    .history-item .freetext {
      font-family: var(--font-display);
      font-size: 14px;
      color: var(--ink-dim);
      font-style: italic;
      font-variation-settings: "opsz" 14;
      margin-top: 6px;
      line-height: 1.4;
    }
    .empty {
      color: var(--ink-dim);
      text-align: center;
      padding: 40px 20px;
      font-size: 14px;
    }

    .tabs {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      background: var(--bg-soft);
      border-radius: var(--radius-button);
      padding: 4px;
      margin-bottom: 22px;
    }
    .tab {
      padding: 10px;
      border-radius: var(--radius-button);
      background: transparent;
      border: none;
      color: var(--ink-dim);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .tab.active { background: var(--bg-elev); color: var(--ink); }

    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--ink);
      color: var(--bg);
      padding: 10px 18px;
      border-radius: 999px;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 20;
    }
    .toast.show { opacity: 1; }

    h1.section-heading {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 400;
      letter-spacing: -0.015em;
      line-height: 1.2;
      color: var(--ink);
      margin: 0 0 22px;
      text-wrap: pretty;
      font-variation-settings: "opsz" 144;
    }

    /* ── Guide FAB (sketchy "?") ──────────────────────────────── */
    .fab {
      position: fixed;
      right: 18px;
      bottom: calc(env(safe-area-inset-bottom) + 86px);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--bg-elev);
      color: var(--accent);
      border: 0.5px solid var(--hairline);
      box-shadow: 0 6px 18px rgba(0,0,0,0.18), 0 0 0 1px rgba(255,255,255,0.04) inset;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      z-index: 15;
      transition: opacity 0.28s ease, transform 0.18s ease, box-shadow 0.28s ease;
    }
    .fab:active { transform: scale(0.94); }
    .fab[hidden] { display: none; }
    .fab-glyph {
      display: inline-flex;
      transform-origin: 50% 60%;
    }
    .fab.pulse { box-shadow: 0 6px 18px rgba(0,0,0,0.18), 0 0 0 0 var(--glow); animation: fabHalo 1.8s ease-out infinite; }
    .fab.pulse .fab-glyph { animation: fabGiggle 1.4s ease-in-out infinite; }
    @keyframes fabGiggle {
      0%, 100% { transform: rotate(-5deg); }
      20%      { transform: rotate(6deg) translateY(-1px); }
      45%      { transform: rotate(-3deg); }
      70%      { transform: rotate(5deg) translateY(1px); }
    }
    @keyframes fabHalo {
      0%   { box-shadow: 0 6px 18px rgba(0,0,0,0.18), 0 0 0 0 var(--glow); }
      70%  { box-shadow: 0 6px 18px rgba(0,0,0,0.18), 0 0 0 14px rgba(0,0,0,0); }
      100% { box-shadow: 0 6px 18px rgba(0,0,0,0.18), 0 0 0 0 rgba(0,0,0,0); }
    }
    @media (prefers-reduced-motion: reduce) {
      .fab.pulse, .fab.pulse .fab-glyph { animation: none; }
    }

    /* ── Onboarding overlay (spotlight + tooltip) ─────────────── */
    .onboarding {
      position: fixed;
      inset: 0;
      z-index: 30;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.22s ease;
    }
    .onboarding.active { opacity: 1; pointer-events: auto; }
    .onboarding-scrim {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
    }
    @media (prefers-color-scheme: light) {
      .onboarding-scrim { background: rgba(15, 20, 17, 0.45); }
    }
    .onboarding-spotlight {
      position: absolute;
      border-radius: 14px;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.55), 0 0 0 2px var(--accent) inset;
      transition: top 0.28s cubic-bezier(0.2, 0.8, 0.2, 1),
                  left 0.28s cubic-bezier(0.2, 0.8, 0.2, 1),
                  width 0.28s cubic-bezier(0.2, 0.8, 0.2, 1),
                  height 0.28s cubic-bezier(0.2, 0.8, 0.2, 1);
      pointer-events: none;
    }
    @media (prefers-color-scheme: light) {
      .onboarding-spotlight { box-shadow: 0 0 0 9999px rgba(15,20,17,0.45), 0 0 0 2px var(--accent) inset; }
    }
    .onboarding-spotlight.center {
      top: 50%; left: 50%; width: 0; height: 0;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.65);
    }
    @media (prefers-color-scheme: light) {
      .onboarding-spotlight.center { box-shadow: 0 0 0 9999px rgba(15,20,17,0.55); }
    }
    .onboarding-tip {
      position: absolute;
      max-width: 320px;
      width: calc(100% - 44px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-elev);
      color: var(--ink);
      border: 0.5px solid var(--hairline);
      border-radius: var(--radius-card);
      padding: 16px 18px 14px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
      font-family: var(--font-body);
      transition: top 0.28s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .onboarding-tip-step {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .onboarding-tip-title {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 400;
      letter-spacing: -0.012em;
      line-height: 1.25;
      margin: 0 0 8px;
      font-variation-settings: "opsz" 144;
    }
    .onboarding-tip-body {
      font-size: 14px;
      line-height: 1.45;
      color: var(--ink-dim);
      margin: 0 0 14px;
    }
    .onboarding-tip-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: flex-end;
    }
    .onboarding-tip-skip {
      background: transparent;
      border: none;
      color: var(--ink-faint);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      padding: 8px 10px;
      cursor: pointer;
      margin-right: auto;
    }
    .onboarding-tip-next {
      background: var(--accent);
      color: var(--accent-ink);
      border: none;
      border-radius: var(--radius-button);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      padding: 10px 18px;
      min-height: 40px;
      cursor: pointer;
    }
    .onboarding-tip-next:active { transform: scale(0.98); }

  </style>
</head>
<body data-weather="grove">
  <video class="bg-video active" id="bgVideo" autoplay loop muted playsinline preload="auto" aria-hidden="true">
    <source src="art/art-05.mp4" type="video/mp4" />
  </video>
  <img class="bg-image" id="bgImage" alt="" aria-hidden="true" />

  <div class="onboarding" id="onboarding" aria-hidden="true" role="dialog" aria-label="Steady guide">

      <div class="onboarding-tip-step" id="onboardingStepLabel"></div>
      <h2 class="onboarding-tip-title" id="onboardingTitle"></h2>
      <p class="onboarding-tip-body" id="onboardingBody"></p>

        <button class="onboarding-tip-skip" id="onboardingSkip" type="button">Skip</button>
        <button class="onboarding-tip-next" id="onboardingNext" type="button">Next</button>
      </div>

  <div class="toast" id="toast"></div>

  <script>
    // ============================================================
    // Steady — phase 0 prototype
    // Embedded seed library + localStorage persistence
    // ============================================================

    const SEED = {
      mood: ["anxious", "wired", "flat", "sad", "frustrated", "scattered", "overwhelmed"],
      need: ["grounding", "calming", "focusing", "energizing", "perspective", "self-compassion"],
      // Items load asynchronously from content/seed.json on first run, then cached
    };

    // Mood-dynamic theming — palette morphs based on the user's check-in.
    // Mapping mirrors tokens.jsx#moodToWeather from the design handoff.
    const WEATHER_MOODS = {
      dawn:  { mood: ["anxious", "wired", "overwhelmed"], need: ["calming", "self-compassion"] },
      grove: { mood: ["flat", "sad", "scattered"],        need: ["grounding", "focusing"] },
      dusk:  { mood: ["frustrated"],                       need: ["perspective", "energizing"] },
    };
    function moodToWeather(moods, needs, hour) {
      const score = { dawn: 0, grove: 0, dusk: 0 };
      for (const k of Object.keys(WEATHER_MOODS)) {
        const w = WEATHER_MOODS[k];
        moods.forEach(m => { if (w.mood.includes(m)) score[k] += 2; });
        needs.forEach(n => { if (w.need.includes(n)) score[k] += 1; });
      }
      if (hour != null) {
        if (hour >= 5 && hour < 11) score.dawn += 0.5;
        if (hour >= 11 && hour < 18) score.grove += 0.3;
        if (hour >= 18 || hour < 5) score.dusk += 0.5;
      }
      let best = "grove", max = -Infinity;
      for (const k of Object.keys(score)) if (score[k] > max) { max = score[k]; best = k; }
      return best;
    }
    function applyWeather() {
      const w = moodToWeather([...state.mood], [...state.need], new Date().getHours());
      document.body.dataset.weather = w;
      const badge = document.getElementById("weatherBadge");
      if (badge) badge.textContent = w;
    }

    const STORE_KEYS = {
      checkIns: "steady.checkIns",
      sessions: "steady.sessions",
      feedback: "steady.feedback",
      content: "steady.content",
      lastShown: "steady.lastShown",
      seenOnboarding: "steady.seenOnboarding",
    };

    const state = {
      mood: new Set(),
      need: new Set(),
      energy: null,
      freeText: "",
      currentSession: null,
      currentContentItem: null,
      content: [],
    };

    // ----------- Storage helpers -----------
    const load = (k, fallback) => {
      try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fallback; }
      catch { return fallback; }
    };
    const save = (k, v) => { localStorage.setItem(k, JSON.stringify(v)); };
    const uid = () => Math.random().toString(36).slice(2, 11);
    const now = () => Date.now();

    // ----------- Bootstrapping content -----------
    async function bootContent() {
      const cached = load(STORE_KEYS.content, null);
      const fetchFresh = fetch("content/seed.json")
        .then(r => r.ok ? r.json() : null)
        .catch(() => null);

      if (cached && cached.items && cached.items.length) {
        state.content = cached.items;
        // Background refresh if seed bumped its version
        fetchFresh.then(data => {
          if (data && data.version !== cached.version) {
            save(STORE_KEYS.content, data);
            state.content = data.items;
          }
        });
        return;
      }

      const data = await fetchFresh;
      if (data) {
        save(STORE_KEYS.content, data);
        state.content = data.items;
      } else {
        console.error("Could not load seed library");
        toast("Content library unavailable");
      }
    }

    // ----------- Recommender -----------
    // Five Rings lens — mirrors backend/src/recommender.ts NEED_TO_RING.
    // Each selected `need` chip injects its ring into the tag set so
    // ring-aligned content gets a +1 overlap bonus in scoring.
    const NEED_TO_RING = {
      grounding: "earth",
      calming: "water",
      focusing: "fire",
      energizing: "fire",
      perspective: "wind",
      "self-compassion": "void",
    };
    const RINGS = ["earth", "water", "fire", "wind", "void"];

    function inferContextTags() {
      const h = new Date().getHours();
      const tags = [];
      if (h >= 5 && h < 11) tags.push("morning");
      if (h >= 22 || h < 5) tags.push("late-night");
      return tags;
    }

    function getCheckInTags() {
      const ringTags = [...state.need].map(n => NEED_TO_RING[n]).filter(Boolean);
      return [...state.mood, ...state.need, ...ringTags, ...inferContextTags()];
    }

    function getPersonalScore(itemId) {
      const fb = load(STORE_KEYS.feedback, []);
      const ratings = fb.filter(f => f.content_id === itemId);
      if (!ratings.length) return 0;
      const score = ratings.reduce((s, r) => {
        if (r.rating === "helped") return s + 1;
        if (r.rating === "missed") return s - 1;
        return s;
      }, 0);
      return score / ratings.length;
    }

    function getRecencyPenalty(itemId) {
      const lastShown = load(STORE_KEYS.lastShown, {});
      const last = lastShown[itemId];
      if (!last) return 0;
      const daysAgo = (now() - last) / (1000 * 60 * 60 * 24);
      if (daysAgo < 1) return -2;
      if (daysAgo < 3) return -1;
      if (daysAgo < 7) return -0.4;
      return 0;
    }

    function recommend(n = 1, excludeIds = []) {
      const tags = getCheckInTags();
      if (!state.content.length) return [];

      const scored = state.content
        .filter(item => item.type !== "artwork" && !excludeIds.includes(item.id) && !item.archived)
        .map(item => {
          const overlap = item.tags.filter(t => tags.includes(t)).length;
          const personal = getPersonalScore(item.id) * 0.5;
          const recency = getRecencyPenalty(item.id);
          const rand = Math.random() * 0.3;
          return {
            item,
            score: overlap + personal + recency + rand,
            overlap,
          };
        })
        .filter(s => s.overlap > 0 || tags.length === 0)
        .sort((a, b) => b.score - a.score);

      return scored.slice(0, n).map(s => s.item);
    }

    // ----------- Session lifecycle -----------
    function recordCheckIn() {
      const checkIn = {
        id: uid(),
        created_at: now(),
        state: {
          mood: [...state.mood],
          energy: state.energy,
          need: [...state.need],
          free_text: state.freeText.trim() || undefined,
        },
        context: {
          time_of_day: new Date().getHours(),
          inferred_tags: inferContextTags(),
        },
      };
      const checkIns = load(STORE_KEYS.checkIns, []);
      checkIns.push(checkIn);
      save(STORE_KEYS.checkIns, checkIns);
      return checkIn;
    }

    function startSession(checkIn, contentItems) {
      const session = {
        id: uid(),
        check_in_id: checkIn.id,
        content_ids: contentItems.map(c => c.id),
        started_at: now(),
        ended_at: null,
      };
      const sessions = load(STORE_KEYS.sessions, []);
      sessions.push(session);
      save(STORE_KEYS.sessions, sessions);

      const lastShown = load(STORE_KEYS.lastShown, {});
      contentItems.forEach(c => { lastShown[c.id] = now(); });
      save(STORE_KEYS.lastShown, lastShown);

      return session;
    }

    function endSession(session) {
      const sessions = load(STORE_KEYS.sessions, []);
      const idx = sessions.findIndex(s => s.id === session.id);
      if (idx >= 0) {
        sessions[idx].ended_at = now();
        save(STORE_KEYS.sessions, sessions);
      }
    }

    function recordFeedback(session, item, rating) {
      const fb = load(STORE_KEYS.feedback, []);
      const existing = fb.findIndex(f => f.session_id === session.id && f.content_id === item.id);
      const entry = {
        id: existing >= 0 ? fb[existing].id : uid(),
        session_id: session.id,
        content_id: item.id,
        rating,
        created_at: now(),
      };
      if (existing >= 0) fb[existing] = entry; else fb.push(entry);
      save(STORE_KEYS.feedback, fb);
    }

    // ----------- Rendering -----------
    function renderMoodChips() {
      const wrap = document.getElementById("moodChips");
      wrap.innerHTML = "";
      SEED.mood.forEach(m => {
        const btn = document.createElement("button");
        btn.className = "chip";
        btn.textContent = m;
        btn.dataset.tag = m;
        btn.addEventListener("click", () => {
          if (state.mood.has(m)) state.mood.delete(m); else state.mood.add(m);
          btn.classList.toggle("selected");
          updateCtaState();
          applyWeather();
        });
        wrap.appendChild(btn);
      });
    }

    function renderNeedChips() {
      const wrap = document.getElementById("needChips");
      wrap.innerHTML = "";
      const labels = {
        "grounding": "ground me",
        "calming": "calm me",
        "focusing": "focus me",
        "energizing": "lift me",
        "perspective": "perspective",
        "self-compassion": "self-compassion",
      };
      SEED.need.forEach(n => {
        const btn = document.createElement("button");
        btn.className = "chip";
        btn.textContent = labels[n] || n;
        btn.dataset.tag = n;
        btn.addEventListener("click", () => {
          if (state.need.has(n)) state.need.delete(n); else state.need.add(n);
          btn.classList.toggle("selected");
          applyWeather();
        });
        wrap.appendChild(btn);
      });
    }

    function bindEnergyToggle() {
      document.querySelectorAll("#energyToggle .chip").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll("#energyToggle .chip").forEach(b => b.classList.remove("selected"));
          btn.classList.add("selected");
          state.energy = btn.dataset.energy;
          applyWeather();
        });
      });
    }

    function bindFreeText() {
      const toggle = document.getElementById("freeTextToggle");
      const input = document.getElementById("freeText");
      toggle.addEventListener("click", () => {
        const visible = input.style.display !== "none";
        input.style.display = visible ? "none" : "block";
        toggle.textContent = visible ? "+ Anything else?" : "− Hide note";
        if (!visible) input.focus();
      });
      input.addEventListener("input", () => { state.freeText = input.value; });
    }

    function updateCtaState() {
      // Always allow showing something — even with no input we'll fall back to context-only
      document.getElementById("showMeBtn").disabled = false;
    }

    function pickBackgroundArt(forItem) {
      const arts = state.content.filter(i =>
        i.type === "artwork" && i.media_type !== "video" && i.image_url
      );
      if (!arts.length) return null;
      const refTags = [...(forItem.tags || []), ...inferContextTags()];
      return arts
        .map(a => ({
          a,
          score: a.tags.filter(t => refTags.includes(t)).length + Math.random() * 0.5,
        }))
        .sort((x, y) => y.score - x.score)[0].a;
    }

    function setBackground({ video = false, imageUrl = null } = {}) {
      const vid = document.getElementById("bgVideo");
      const img = document.getElementById("bgImage");
      if (video) {
        img.classList.remove("active");
        vid.classList.add("active");
        vid.play().catch(() => {});
      } else if (imageUrl) {
        vid.classList.remove("active");
        img.src = imageUrl;
        img.classList.add("active");
      }
    }

    function showContent(item) {
      state.currentContentItem = item;
      const ring = (item.tags || []).find(t => RINGS.includes(t));
      document.getElementById("contentType").textContent = ring
        ? `${item.type} · ${ring}`
        : item.type;

      const txt = document.getElementById("contentText");
      txt.style.display = "block";
      const isQuoteish = item.type !== "exercise";
      txt.textContent = isQuoteish ? `“${item.text}”` : item.text;

      const art = pickBackgroundArt(item);
      if (art) setBackground({ imageUrl: art.image_url });

      document.getElementById("contentAttribution").textContent = item.attribution
        ? `— ${item.attribution}` + (item.duration_sec ? ` · ${item.duration_sec}s` : "")
        : (item.duration_sec ? `${item.duration_sec}s` : "");

      // Reset feedback button states
      document.querySelectorAll(".feedback-btn").forEach(b => b.classList.remove("recorded"));

      document.getElementById("dashboardView").style.display = "none";
      document.getElementById("historyView").classList.remove("active");
      document.getElementById("contentView").classList.add("active");
      document.getElementById("stickyCta").style.display = "none";
      document.getElementById("tabs").style.display = "none";
      setFabVisible(false);
      window.scrollTo(0, 0);
    }

    function showDashboard() {
      document.getElementById("contentView").classList.remove("active");
      document.getElementById("historyView").classList.remove("active");
      document.getElementById("dashboardView").style.display = "block";
      document.getElementById("stickyCta").style.display = "block";
      const hasHistory = (load(STORE_KEYS.checkIns, []) || []).length > 0;
      document.getElementById("tabs").style.display = hasHistory ? "grid" : "none";
      setActiveTab("dashboard");
      setFabVisible(true);
      setBackground({ video: true });
    }

    function showHistory() {
      const checkIns = (load(STORE_KEYS.checkIns, []) || []).slice().reverse();
      const list = document.getElementById("historyList");
      if (!checkIns.length) {
        list.innerHTML = '<div class="empty">No check-ins yet.</div>';
      } else {
        list.innerHTML = checkIns.slice(0, 50).map(ci => {
          const d = new Date(ci.created_at);
          const when = d.toLocaleString([], { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
          const stateBits = [];
          if (ci.state.mood && ci.state.mood.length) stateBits.push(ci.state.mood.join(", "));
          if (ci.state.energy) stateBits.push(`${ci.state.energy} energy`);
          if (ci.state.need && ci.state.need.length) stateBits.push(`needed: ${ci.state.need.join(", ")}`);
          const free = ci.state.free_text ? `<div class="freetext">"${escapeHtml(ci.state.free_text)}"</div>` : "";
          return `<div class="history-item">
            <div class="when">${when}</div>
            <div class="state">${stateBits.join(" · ") || "(no input)"}</div>
            ${free}
          </div>`;
        }).join("");
      }
      document.getElementById("dashboardView").style.display = "none";
      document.getElementById("contentView").classList.remove("active");
      document.getElementById("historyView").classList.add("active");
      document.getElementById("stickyCta").style.display = "none";
      setActiveTab("history");
      setFabVisible(true);
    }

    function setActiveTab(view) {
      document.querySelectorAll(".tab").forEach(t => {
        t.classList.toggle("active", t.dataset.view === view);
      });
    }

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
    }

    function toast(msg) {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.classList.add("show");
      clearTimeout(toast._t);
      toast._t = setTimeout(() => el.classList.remove("show"), 2000);
    }

    function updateStreak() {
      const checkIns = load(STORE_KEYS.checkIns, []);
      const wrap = document.getElementById("streak");
      const count = document.getElementById("streakCount");
      if (!checkIns.length) { wrap.hidden = true; return; }
      const dates = new Set(checkIns.map(c => new Date(c.created_at).toDateString()));
      count.textContent = dates.size;
      wrap.hidden = false;
    }

    // ----------- Guide FAB + onboarding tour -----------
    const TOUR_STEPS = [
      {
        target: null,
        title: "Hi. I'm Steady.",
        body: "A 30-second check-in, then I'll find a quote or exercise that fits where you are. Want a quick tour?",
        nextLabel: "Show me",
      },
      {
        target: "#moodChips",
        title: "Start with mood.",
        body: "Tap whatever feels true right now. Pick one, pick a few — there's no wrong answer.",
      },
      {
        target: "#energyToggle",
        title: "Then your energy.",
        body: "Low, mid, or high. This shapes whether I lean toward a calm read or something more activating.",
      },
      {
        target: "#needChips",
        title: "What would help?",
        body: "Pick the kind of nudge you need. These map to the five rings — earth, water, fire, wind, void.",
      },
      {
        target: "#showMeBtn",
        title: "Then tap this.",
        body: "I'll pick something that fits. If it doesn't land, tell me — I'll learn.",
        nextLabel: "Got it",
      },
    ];

    function setFabVisible(visible) {
      const fab = document.getElementById("guideFab");
      if (!fab) return;
      fab.hidden = !visible;
    }

    function isFirstRun() {
      const seen = load(STORE_KEYS.seenOnboarding, false);
      const checkIns = load(STORE_KEYS.checkIns, []) || [];
      return !seen && checkIns.length === 0;
    }

    function markOnboardingSeen() {
      save(STORE_KEYS.seenOnboarding, true);
      const fab = document.getElementById("guideFab");
      if (fab) fab.classList.remove("pulse");
    }

    const tour = {
      idx: 0,
      active: false,
      onResize: null,
    };

    function startTour() {
      // Tour assumes the dashboard is visible — bring user back if they're elsewhere.
      const onContent = document.getElementById("contentView").classList.contains("active");
      const onHistory = document.getElementById("historyView").classList.contains("active");
      if (onContent || onHistory) showDashboard();

      tour.idx = 0;
      tour.active = true;
      document.getElementById("onboarding").classList.add("active");
      document.getElementById("onboarding").setAttribute("aria-hidden", "false");
      const fab = document.getElementById("guideFab");
      if (fab) fab.classList.remove("pulse");
      tour.onResize = () => renderTourStep();
      window.addEventListener("resize", tour.onResize);
      window.addEventListener("scroll", tour.onResize, { passive: true });
      renderTourStep();
    }

    function endTour({ completed }) {
      tour.active = false;
      document.getElementById("onboarding").classList.remove("active");
      document.getElementById("onboarding").setAttribute("aria-hidden", "true");
      if (tour.onResize) {
        window.removeEventListener("resize", tour.onResize);
        window.removeEventListener("scroll", tour.onResize);
        tour.onResize = null;
      }
      // Reset spotlight to center for next open
      const spot = document.getElementById("onboardingSpotlight");
      spot.classList.add("center");
      spot.style.cssText = "";
      if (completed) markOnboardingSeen(); else save(STORE_KEYS.seenOnboarding, true);
      const fab = document.getElementById("guideFab");
      if (fab) fab.classList.remove("pulse");
    }

    function renderTourStep() {
      const step = TOUR_STEPS[tour.idx];
      if (!step) { endTour({ completed: true }); return; }

      const tip = document.getElementById("onboardingTip");
      const spot = document.getElementById("onboardingSpotlight");
      document.getElementById("onboardingStepLabel").textContent =
        `Step ${tour.idx + 1} of ${TOUR_STEPS.length}`;
      document.getElementById("onboardingTitle").textContent = step.title;
      document.getElementById("onboardingBody").textContent = step.body;
      const nextBtn = document.getElementById("onboardingNext");
      nextBtn.textContent = step.nextLabel
        || (tour.idx === TOUR_STEPS.length - 1 ? "Done" : "Next");

      const target = step.target ? document.querySelector(step.target) : null;

      if (!target) {
        spot.classList.add("center");
        spot.style.top = ""; spot.style.left = "";
        spot.style.width = ""; spot.style.height = "";
        // Center the tip vertically
        const vh = window.innerHeight;
        const tipH = tip.offsetHeight || 180;
        tip.style.top = `${Math.max(20, (vh - tipH) / 2)}px`;
        return;
      }

      target.scrollIntoView({ block: "center", behavior: "smooth" });
      // Wait one frame for layout to settle after scroll
      requestAnimationFrame(() => {
        const rect = target.getBoundingClientRect();
        const pad = 8;
        const top = Math.max(8, rect.top - pad);
        const left = Math.max(8, rect.left - pad);
        const width = rect.width + pad * 2;
        const height = rect.height + pad * 2;
        spot.classList.remove("center");
        spot.style.top = `${top}px`;
        spot.style.left = `${left}px`;
        spot.style.width = `${width}px`;
        spot.style.height = `${height}px`;

        // Place tip above or below the spotlight, whichever has more room
        const vh = window.innerHeight;
        const spaceBelow = vh - (top + height);
        const spaceAbove = top;
        const tipH = tip.offsetHeight || 180;
        const gap = 14;
        let tipTop;
        if (spaceBelow >= tipH + gap + 20 || spaceBelow >= spaceAbove) {
          tipTop = top + height + gap;
        } else {
          tipTop = Math.max(20, top - tipH - gap);
        }
        tip.style.top = `${tipTop}px`;
      });
    }

    function advanceTour() {
      tour.idx += 1;
      if (tour.idx >= TOUR_STEPS.length) {
        endTour({ completed: true });
        toast("You're set");
      } else {
        renderTourStep();
      }
    }

    // ----------- Event wiring -----------
    function init() {
      renderMoodChips();
      renderNeedChips();
      bindEnergyToggle();
      bindFreeText();
      updateStreak();
      applyWeather();

      const hasHistory = (load(STORE_KEYS.checkIns, []) || []).length > 0;
      document.getElementById("tabs").style.display = hasHistory ? "grid" : "none";

      document.getElementById("showMeBtn").addEventListener("click", () => {
        const ci = recordCheckIn();
        const items = recommend(1);
        if (!items.length) { toast("No content matched — try different inputs"); return; }
        const session = startSession(ci, items);
        state.currentSession = session;
        showContent(items[0]);
        updateStreak();
      });

      document.querySelectorAll(".feedback-btn").forEach(b => {
        b.addEventListener("click", () => {
          if (!state.currentSession || !state.currentContentItem) return;
          recordFeedback(state.currentSession, state.currentContentItem, b.dataset.rating);
          document.querySelectorAll(".feedback-btn").forEach(x => x.classList.remove("recorded"));
          b.classList.add("recorded");
          toast("Saved");
        });
      });

      document.getElementById("anotherBtn").addEventListener("click", () => {
        if (!state.currentSession) return;
        const exclude = state.currentSession.content_ids;
        const items = recommend(1, exclude);
        if (!items.length) { toast("Nothing else fits — try a fresh check-in"); return; }
        state.currentSession.content_ids.push(items[0].id);
        const sessions = load(STORE_KEYS.sessions, []);
        const idx = sessions.findIndex(s => s.id === state.currentSession.id);
        if (idx >= 0) { sessions[idx] = state.currentSession; save(STORE_KEYS.sessions, sessions); }
        const lastShown = load(STORE_KEYS.lastShown, {});
        lastShown[items[0].id] = now();
        save(STORE_KEYS.lastShown, lastShown);
        showContent(items[0]);
      });

      document.getElementById("doneBtn").addEventListener("click", () => {
        if (state.currentSession) endSession(state.currentSession);
        // Reset transient UI state
        state.mood.clear();
        state.need.clear();
        state.energy = null;
        state.freeText = "";
        state.currentSession = null;
        state.currentContentItem = null;
        document.getElementById("freeText").value = "";
        document.getElementById("freeText").style.display = "none";
        document.getElementById("freeTextToggle").textContent = "+ Anything else?";
        document.querySelectorAll(".chip.selected").forEach(c => c.classList.remove("selected"));
        applyWeather();
        showDashboard();
      });

      document.getElementById("historyToggle").addEventListener("click", () => {
        const isHistory = document.getElementById("historyView").classList.contains("active");
        if (isHistory) showDashboard(); else showHistory();
      });

      document.querySelectorAll(".tab").forEach(t => {
        t.addEventListener("click", () => {
          if (t.dataset.view === "dashboard") showDashboard();
          else showHistory();
        });
      });

      // Guide FAB — pulse on first run, opens tour on tap.
      const fab = document.getElementById("guideFab");
      if (fab) {
        if (isFirstRun()) fab.classList.add("pulse");
        fab.addEventListener("click", startTour);
      }
      document.getElementById("onboardingNext").addEventListener("click", advanceTour);
      document.getElementById("onboardingSkip").addEventListener("click",
        () => endTour({ completed: false }));
      document.getElementById("onboardingScrim").addEventListener("click",
        () => endTour({ completed: false }));

      // Auto-launch the tour for brand-new users so they're not stranded
      // staring at chips. Delay one frame so layout has settled.
      if (isFirstRun()) requestAnimationFrame(startTour);

      // Register service worker for PWA
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("service-worker.js").catch(() => {});
      }
    }

    bootContent().then(init);
  </script>
</body>
</html>
